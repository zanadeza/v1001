services:
  - type: web
    name: mailbox-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mailbox-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: MAILGUN_WEBHOOK_SECRET
        sync: false
      - key: CLOUDFLARE_WEBHOOK_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: mailbox-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .

databases:
  - name: mailbox-db
    databaseName: mailbox
    plan: free
